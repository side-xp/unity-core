name: Release Please

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: "!github.event.repository.is_template"
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
