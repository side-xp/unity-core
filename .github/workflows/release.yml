# This workflow runs whenever a GitHub Release is published by the Release Please workflow.
# It generates the API reference as MarkDown files ONCE (using the SideXP.Instadoc CLI tool), then reuses that
# output across two jobs:
#   - deploy-pages:    builds the documentation website with MkDocs and deploys it to GitHub Pages.
#   - release-assets:  packages the source + docs into ZIP/Tarball archives and attaches them to the Release.
# Make sure you have selected "GitHub Actions" mode in Settings > Pages.
# After running this workflow, the website should be accessible at https://[username].github.io/[repository-name]
name: Release & docs

# Trigger whenever a GitHub Release is published, so the deployed docs & assets always match a released version.
# The manual "workflow_dispatch" trigger is also enabled so the docs can be rebuilt/tested without cutting a release.
# Note: the release-assets job is skipped on manual runs, since there is no Release to attach assets to.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Generate the API reference as MarkDown files ONCE, and share it with the downstream jobs as an artifact.
  generate-docs:
    name: Generate API docs
    runs-on: ubuntu-latest
    if: "!github.event.repository.is_template"
    permissions:
      contents: read

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v7

      # Install the .NET SDK, required to run the SideXP.Instadoc CLI tool.
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      # Install the SideXP.Instadoc CLI tool as a global .NET tool, and make sure its install location is on PATH.
      - name: Install SideXP.Instadoc
        run: |
          dotnet tool install --global SideXP.Instadoc
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # Generate the API reference as MarkDown files into Documentation~/api/ directly from the C# source.
      # No compilation is needed: the tool scans the .cs files with Roslyn.
      - name: Generate API docs
        run: |
          instadoc \
            --input Runtime \
            --input Editor \
            --input Demos \
            --output "Documentation~/api" \
            --grouping namespace \
            --exclude "**/*.Generated.cs" \
            --quiet

      # Upload the generated MarkDown as an artifact, so the deploy-pages and release-assets jobs can reuse it
      # without regenerating. The artifact is only needed within this run, hence the short retention.
      - name: Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: "Documentation~/api"
          retention-days: 1

  # Build the documentation website with MkDocs and deploy it to GitHub Pages.
  deploy-pages:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    needs: generate-docs
    if: "!github.event.repository.is_template"
    permissions:
      id-token: write
      pages: write
      contents: read
    # Allow only one concurrent Pages deployment, without cancelling in-progress ones.
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      # Checkout repository (provides the rest of Documentation~/: guides, images, mkdocs.yml, ...)
      - name: Checkout repository
        uses: actions/checkout@v7

      # Restore the generated API docs (from the generate-docs job) into Documentation~/api/.
      - name: Download API docs artifact
        uses: actions/download-artifact@v8
        with:
          name: api-docs
          path: "Documentation~/api"

      # Install Python for this workflow
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Install MkDocs. If you want to use a specific theme, add it to this install command.
      # Example: pip install mkdocs mkdocs-bootswatch
      - name: Install MkDocs
        run: pip install mkdocs

      # Create a separate docs/ folder that will contain the content of the Documentation~/ folder.
      # This is used to extract the mkdocs.yml file, since MkDocs doesn't allow it to be part of the root directory.
      - name: Prepare docs folder & build
        run: |
          mkdir -p docs
          cp -a "Documentation~" "docs"
          mv "docs/Documentation~/mkdocs.yml" "docs"
          cd docs
          mkdocs build --strict

      # Configure GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      # Upload the MkDocs build output (which by default is in a site/ folder)
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      # Deploy the website to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # Display output link
      - name: Feedback
        run: |
          echo "Documentation website successfully deployed at https://${{github.repository_owner}}.github.io/${{github.event.repository.name}}"

  # Package the source + docs into ZIP/Tarball archives and attach them to the published Release.
  # Skipped on manual (workflow_dispatch) runs, since there is no Release to attach assets to.
  release-assets:
    name: Create Release assets
    runs-on: ubuntu-latest
    needs: generate-docs
    if: "!github.event.repository.is_template && github.event_name == 'release'"
    permissions:
      contents: write

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v7

      # Package the source as ZIP and Tarball archives, using `git archive` so that only tracked files are included.
      # This honors the `export-ignore` attributes in .gitattributes (which exclude .github/, .vscode/, etc.), and
      # naturally leaves out the generated Documentation~/api/ folder since it is untracked (gitignored) -- keeping
      # the package archives lean, matching the committed package's contents.
      # Archives are named [package-name].zip / [package-name].tar.gz, reading the name from package.json.
      - name: Package source archives
        run: |
          mkdir -p dist
          NAME=$(jq -r .name "package.json")
          git archive --format=zip    -o "dist/$NAME.zip"    HEAD
          git archive --format=tar.gz -o "dist/$NAME.tar.gz" HEAD

      # Restore the generated API docs (from the generate-docs job) into Documentation~/api/, so they are included
      # in the docs archive below.
      - name: Download API docs artifact
        uses: actions/download-artifact@v8
        with:
          name: api-docs
          path: "Documentation~/api"

      # Package the documentation (including the freshly generated MarkDown api/ files) as a ZIP archive.
      # That archive file is named Documentation_vX.Y.Z.zip, using the release tag as the version.
      # This is built manually (not via `git archive`) precisely because it must include the untracked api/ folder.
      # The mkdocs.yml file is excluded, as the archive only ships the MarkDown files, not the website config.
      - name: Package docs archive
        run: |
          mkdir -p dist release/docs
          cp -a "Documentation~" "release/docs"
          rm "release/docs/Documentation~/mkdocs.yml"
          cd release/docs
          zip -r -q "${{ github.workspace }}/dist/Documentation_${{ github.event.release.tag_name }}.zip" ./*

      # Upload all archives (everything in dist/) as assets on the existing GitHub Release entry.
      - name: Upload Release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*