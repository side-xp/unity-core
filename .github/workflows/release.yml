# This workflow runs whenever a GitHub Release is published by the Release Please workflow.
# It packages only the "useful" files (excluding .github/, .vscode/, etc.) into ZIP and Tarball
# archives, and also zips the documentation, then attaches all of them as assets to the release.
name: Release package

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: "!github.event.repository.is_template"

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v7

      # Install the .NET SDK, required to run the SideXP.Instadoc CLI tool.
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      # Install the SideXP.Instadoc CLI tool as a global .NET tool, and make sure its install location is on PATH.
      - name: Install SideXP.Instadoc
        run: |
          dotnet tool install --global SideXP.Instadoc
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # Read the "name" property from package.json, which is used as the archive file name.
      # The version is read from the release tag provided by the GitHub event instead.
      - name: Read package.json
        id: pkg
        run: |
          NAME=$(jq -r .name "package.json")
          echo "package_name=$NAME" >> $GITHUB_OUTPUT

      # Create a release/package/ folder that will contain only the "useful" files (exclude .github/, .vscode/, etc.)
      - name: Prepare package folder
        run: |
          mkdir -p release/package
          rsync --prune-empty-dirs -a ./ release/package/ \
            --exclude ".git*" \
            --exclude ".github" \
            --exclude ".vscode" \
            --exclude ".editorconfig" \
            --exclude ".gitignore" \
            --exclude ".vsconfig"

      # Generate the API reference as MarkDown files into Documentation~/api/ directly from the C# source.
      # No compilation is needed: the tool scans the .cs files with Roslyn.
      # This runs after the package folder is prepared, so the generated API docs are included only in the docs
      # archive (below) and not in the package archive, matching the committed package's contents.
      - name: Generate API docs
        run: |
          instadoc \
            --input Runtime \
            --input Editor \
            --input Demos \
            --output "Documentation~/api" \
            --grouping namespace \
            --exclude "**/*.Generated.cs" \
            --quiet

      # Create a separate release/docs/ folder that will contain the content of the Documentation~/ folder.
      # Note that the Documentation~/ folder is included in the package's source anyway.
      - name: Prepare docs folder
        run: |
          mkdir -p release/docs
          cp -a "Documentation~" "release/docs"
          rm "release/docs/Documentation~/mkdocs.yml"

      # Create a ZIP archive with the content of the release/package/ folder.
      # That archive file is named [package-name].zip
      - name: Output package as ZIP archive
        id: pkg_zip
        run: |
          PKG_ZIP_PATH=${{ steps.pkg.outputs.package_name }}.zip
          echo "path=$PKG_ZIP_PATH" >> $GITHUB_OUTPUT
          cd release/package
          zip -r ../$PKG_ZIP_PATH .
          cd ../..

      # Create a Tarball archive with the content of the release/package/ folder.
      # That archive file is named [package-name].tar.gz
      - name: Output package as tarball
        id: pkg_targz
        run: |
          PKG_TARGZ_PATH="${{ steps.pkg.outputs.package_name }}.tar.gz"
          echo "path=$PKG_TARGZ_PATH" >> $GITHUB_OUTPUT
          cd release/package
          tar -czf ../$PKG_TARGZ_PATH .
          cd ../..

      # Create a ZIP archive with the content of the release/docs/ folder.
      # That archive file is named Documentation_vX.Y.Z.zip, using the release tag as the version.
      - name: Output docs as ZIP archive
        id: docs_zip
        run: |
          DOCS_PATH="Documentation_${{ github.event.release.tag_name }}.zip"
          echo "path=$DOCS_PATH" >> $GITHUB_OUTPUT
          cd release/docs
          zip -r -q ../$DOCS_PATH ./*
          cd ../..

      # Upload all archives as assets on the existing GitHub Release entry.
      - name: Upload Release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/${{ steps.pkg_zip.outputs.path }}
            release/${{ steps.pkg_targz.outputs.path }}
            release/${{ steps.docs_zip.outputs.path }}
